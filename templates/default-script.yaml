voice:
  reference_id: ${FISH_REFERENCE_ID}

model:
  name: s2-pro
  temperature: 0.25
  top_p: 0.6
  speed: 1.0
  format: mp3
  bitrate: 192k
  condition_on_previous_chunks: false
  latency: balanced
  chunk_length: 300
  normalize: false
  normalize_loudness: true

pause:
  "、": 0
  "。": 0
  "！": 0
  "？": 0
  line_break: 0
  block: 750

output:
  block_dir: dist/blocks
  master_file: dist/master.mp3

blocks:
  - id: block_001
    text: "ここに読み上げ本文を入れる。"
