voice:
  reference_id: ${FISH_REFERENCE_ID}

model:
  name: s2-pro
  temperature: 0.25
  top_p: 0.6
  speed: 1.0
  format: mp3
  bitrate: 192k
  condition_on_previous_chunks: false
  latency: balanced
  chunk_length: 300
  normalize: false
  normalize_loudness: true

pause:
  "、": 0
  "。": 0
  "！": 0
  "？": 0
  line_break: 0
  block: 750

output:
  block_dir: dist/examples/ochi-short/blocks
  master_file: dist/examples/ochi-short/master.mp3

blocks:
  # Accepted Ochi intro timing:
  # 0.20s after greeting, 0.75s after self-introduction.
  - id: block_001
    text: "皆さんこんにちは、"
    pause_after: 200

  - id: block_002
    text: "オチまさとです。"
    pause_after: 750

  - id: block_003
    text: "じゃあ、いきましょう。"
